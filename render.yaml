# Render Blueprint — CE Empire (Docker web service)
# ใช้: Render Dashboard → New → Blueprint → เชื่อม repo นี้
services:
  - type: web
    name: ce-empire
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      # secrets — ตั้งค่าใน Render dashboard (sync: false = ไม่เก็บใน repo)
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      - key: VITE_APP_ID
        sync: false
      - key: BUILT_IN_FORGE_API_URL
        sync: false
      - key: BUILT_IN_FORGE_API_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      # ออปชัน — เวลาส่งสรุปรายวัน (default 22:00)
      - key: DAILY_SUMMARY_HOUR
        value: "22"
      - key: DAILY_SUMMARY_MINUTE
        value: "0"
